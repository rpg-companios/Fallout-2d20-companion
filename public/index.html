<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <meta name="description" content="Fallout 2d20 RPG Companion — manage characters, weapons, armor, perks and inventory for the Fallout Tabletop Roleplaying Game." />
    <meta name="theme-color" content="#1b1b1b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <script>
      // Store the install prompt globally so React can pick it up even if it fires
      // before the JS bundle finishes loading.
      window.__pwaInstallPrompt = null;

      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        window.__pwaInstallPrompt = event;
        // Notify React if it is already listening
        window.dispatchEvent(new CustomEvent('pwaInstallPromptReady', { detail: event }));
      });

      window.addEventListener('appinstalled', () => {
        window.__pwaInstallPrompt = null;
        window.dispatchEvent(new CustomEvent('pwaInstalled'));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((error) => {
            console.error('Service Worker registration failed:', error);
          });
        });
      }
    </script>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
